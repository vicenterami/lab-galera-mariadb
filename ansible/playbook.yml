# ansible/playbook.yml
---
- name: Instalar y configurar MariaDB Galera Cluster
  hosts: galera_cluster
  become: yes # Esto le dice a Ansible que ejecute los comandos como 'root' (sudo)

  tasks:
    - name: Actualizar el caché de apt
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600 # No actualiza si se hizo hace menos de 1 hora

    - name: Instalar MariaDB Server, Client y Galera
      ansible.builtin.apt:
        name:
          - mariadb-server
          - mariadb-client
          - galera-4 # El paquete que permite la replicación multi-maestro
          - rsync    # Usado por Galera para transferir el estado inicial (SST)
        state: present

    - name: Asegurar que el servicio de MariaDB esté detenido antes de configurar el clúster
      # Es crucial detener la base de datos antes de inyectar la configuración del clúster
      ansible.builtin.service:
        name: mariadb
        state: stopped

    - name: Configurar archivo de Galera (galera.cnf)
      # Inyectamos la configuración que une a los tres nodos
      ansible.builtin.template:
        src: templates/galera.cnf.j2
        dest: /etc/mysql/mariadb.conf.d/99-galera.cnf
        owner: root
        group: root
        mode: '0644'

    - name: Instalar Keepalived en todos los nodos
      ansible.builtin.apt:
        name: keepalived
        state: present
        update_cache: yes
      become: yes

    - name: Configurar Keepalived en Node 1 (Master)
      copy:
        src: keepalived-node1.conf
        dest: /etc/keepalived/keepalived.conf
      when: inventory_hostname == 'node1'
      become: yes

    - name: Configurar Keepalived en Node 2 (Backup)
      copy:
        src: keepalived-node2.conf
        dest: /etc/keepalived/keepalived.conf
      when: inventory_hostname == 'node2'
      become: yes

    - name: Reiniciar y habilitar Keepalived (Solo Node 1 y 2)
      service:
        name: keepalived
        state: restarted
        enabled: yes
      when: inventory_hostname in ['node1', 'node2']
      become: yes

    - name: Instalar HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: yes
      become: yes

    - name: Configurar HAProxy
      ansible.builtin.template:
        src: templates/haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
      become: yes
      notify: Reiniciar HAProxy

    - name: Iniciar MariaDB para configuración inicial (Solo Node 1)
      ansible.builtin.service:
        name: mariadb
        state: started
      when: inventory_hostname == 'node1'
      ignore_errors: yes # Ignora errores si el clúster necesita bootstrap manual

    - name: Crear usuario administrador de la base de datos
      ansible.builtin.command:
        cmd: mysql -u root -e "CREATE USER IF NOT EXISTS 'admin'@'%' IDENTIFIED BY 'admin123'; GRANT ALL PRIVILEGES ON *.* TO 'admin'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"
      when: inventory_hostname == 'node1'
      register: user_creation
      failed_when: false # No queremos que el playbook se detenga si la BD está apagada aún

    - name: Crear usuario para Health Check de HAProxy
      ansible.builtin.command:
        cmd: mysql -u root -e "CREATE USER IF NOT EXISTS 'haproxy'@'%'; FLUSH PRIVILEGES;"
      when: inventory_hostname == 'node1'
      failed_when: false

  handlers:
    - name: Reiniciar HAProxy
      ansible.builtin.service:
        name: haproxy
        state: restarted
      become: yes